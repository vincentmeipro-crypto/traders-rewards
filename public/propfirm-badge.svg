<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 600) rotate(90) scale(600)">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#05070D"/>
    </radialGradient>

    <linearGradient id="ring" x1="200" y1="200" x2="1000" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>

    <linearGradient id="textBlue" x1="350" y1="500" x2="850" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="600" cy="600" r="520" fill="url(#bg)" stroke="url(#ring)" stroke-width="14"/>
  <circle cx="600" cy="600" r="500" stroke="#1E3A8A" stroke-width="2" opacity="0.7"/>

  <!-- Glow Ring -->
  <circle cx="600" cy="600" r="520" stroke="#3B82F6" stroke-width="8" opacity="0.35" filter="url(#glow)"/>

  <!-- French Flag -->
  <g transform="translate(330 230)">
    <rect width="130" height="90" rx="6" fill="#1D4ED8"/>
    <rect x="43" width="44" height="90" fill="#FFFFFF"/>
    <rect x="87" width="43" height="90" fill="#DC2626"/>
  </g>

  <!-- EU Flag -->
  <g transform="translate(540 230)">
    <rect width="130" height="90" rx="6" fill="#1E40AF"/>
    <g fill="#FACC15">
      <circle cx="65" cy="18" r="4"/>
      <circle cx="92" cy="26" r="4"/>
      <circle cx="110" cy="45" r="4"/>
      <circle cx="110" cy="67" r="4"/>
      <circle cx="92" cy="84" r="4"/>
      <circle cx="65" cy="92" r="4"/>
      <circle cx="38" cy="84" r="4"/>
      <circle cx="20" cy="67" r="4"/>
      <circle cx="20" cy="45" r="4"/>
      <circle cx="38" cy="26" r="4"/>
    </g>
  </g>

  <!-- Brand -->
  <text x="600" y="470" text-anchor="middle"
        font-family="Montserrat, Arial, sans-serif"
        font-size="96"
        font-weight="800"
        fill="url(#textBlue)"
        letter-spacing="3">
    PROPFIRM
  </text>

  <!-- Subtitle -->
  <text x="600" y="585" text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="44"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="2">
    CRÉÉE ET GÉRÉE
  </text>

  <text x="600" y="650" text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="54"
        font-weight="800"
        fill="#60A5FA"
        letter-spacing="1.5">
    PAR DES TRADERS FRANÇAIS
  </text>

  <!-- Divider -->
  <line x1="390" y1="735" x2="810" y2="735" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>

  <!-- Footer -->
  <text x="600" y="815" text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="52"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="2">
    BASÉE EN <tspan fill="#60A5FA">EUROPE</tspan>
  </text>

  <!-- Bottom Accent -->
  <circle cx="600" cy="910" r="10" fill="#3B82F6"/>
</svg>
